invoker.environmentVariables.MAVEN_GPG_PASSPHRASE = TEST

# 0th: clean
invoker.goals.1 = -V -e njord:${project.version}:drop-all -Dnjord.yes
# 1st: deploy/stage to release
invoker.goals.2 = -V -e clean deploy -P release -l log-1.log
# 2nd: validate
invoker.goals.3 = -V -e njord:${project.version}:publish -Dnjord.details -l log-2.log
# 3rd: set SNAPSHOT version
invoker.goals.4 = -V -e toolbox:set-version -Dversion=1.0.1-SNAPSHOT -l log-3.log
# 4th: deploy/stage to snapshot
invoker.goals.5 = -V -e clean deploy -P release -l log-4.log
# 5th: validate
invoker.goals.6 = -V -e njord:${project.version}:publish -Dnjord.details -l log-5.log
